<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL AI Assessment Recommender</title>

    <link rel="stylesheet" href="/static/shl_style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

    <div class="container">

        <h1>SHL AI Assessment Recommender</h1>

        <p class="subtitle">
            Find the best SHL assessments for any job role or skill.
        </p>

        <div class="search-box">

            <input
                type="text"
                id="message"
                placeholder="Example: Java Developer">

            <button id="searchBtn">
                Recommend
            </button>

        </div>

        <div id="loading" class="loading">
            Searching assessments...
        </div>

        <div id="result" class="result"></div>

    </div>

    <script>

        const button = document.getElementById("searchBtn");
        const input = document.getElementById("message");
        const result = document.getElementById("result");
        const loading = document.getElementById("loading");

        async function searchAssessment() {

            const message = input.value.trim();

            if (message === "") {
                alert("Please enter a job role or skill.");
                return;
            }

            loading.style.display = "block";
            result.innerHTML = "";

            try {

                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });

                const data = await response.json();

                // Render Gemini Markdown response
                result.innerHTML = marked.parse(data.reply);

            }

            catch (error) {

                result.innerHTML = `
                    <h3>⚠ Error</h3>
                    <p>Unable to connect to the server.</p>
                `;

            }

            loading.style.display = "none";

        }

        button.addEventListener("click", searchAssessment);

        input.addEventListener("keypress", function (event) {

            if (event.key === "Enter") {
                searchAssessment();
            }

        });

    </script>

</body>

</html>
